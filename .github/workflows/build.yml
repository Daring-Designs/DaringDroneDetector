name: Build Firmware

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Heltec board package
        env:
          BOARD_URL: https://resource.heltec.cn/download/package_heltec_esp32_index.json
        run: |
          arduino-cli core update-index --additional-urls "$BOARD_URL"
          arduino-cli core install Heltec-esp32:esp32 --additional-urls "$BOARD_URL"

      - name: Install required libraries
        run: |
          arduino-cli lib install RadioLib
          arduino-cli lib install TinyGPSPlus
          arduino-cli lib install "heltec-eink-modules"

      - name: Prepare sketch directory
        run: |
          mkdir -p DaringDroneDetector
          cp DaringDroneDetector.ino splash_bitmap.h DaringDroneDetector/

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn Heltec-esp32:esp32:heltec_vision_master_e290 \
            --output-dir build \
            DaringDroneDetector

      - name: Rename binary with version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mv build/DaringDroneDetector.ino.bin "DaringDroneDetector-${VERSION}.bin"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DaringDroneDetector-*.bin
          generate_release_notes: true
