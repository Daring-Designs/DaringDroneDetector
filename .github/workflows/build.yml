name: Build Firmware

on:
  push:
    tags: ['v*']

jobs:
  build-heltec:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Heltec board package
        env:
          BOARD_URL: https://resource.heltec.cn/download/package_heltec_esp32_index.json
        run: |
          arduino-cli core update-index --additional-urls "$BOARD_URL"
          arduino-cli core install Heltec-esp32:esp32 --additional-urls "$BOARD_URL"

      - name: Install required libraries
        run: |
          arduino-cli lib install RadioLib
          arduino-cli lib install TinyGPSPlus
          arduino-cli lib install "heltec-eink-modules"

      - name: Prepare sketch directory
        run: |
          mkdir -p DaringDroneDetector
          cp DaringDroneDetector.ino splash_bitmap.h DaringDroneDetector/

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn Heltec-esp32:esp32:heltec_vision_master_e290 \
            --output-dir build \
            DaringDroneDetector

      - name: Stage binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          cp build/DaringDroneDetector.ino.bin "DaringDroneDetector-${VERSION}.bin"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: heltec-bin
          path: DaringDroneDetector-*.bin

  build-lilygo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Espressif ESP32 core
        env:
          BOARD_URL: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        run: |
          arduino-cli core update-index --additional-urls "$BOARD_URL"
          arduino-cli core install esp32:esp32 --additional-urls "$BOARD_URL"

      - name: Install required libraries
        run: |
          arduino-cli lib install RadioLib
          arduino-cli lib install "Arduino_GFX_Library"

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:PartitionScheme=app3M_fat9M_16MB,FlashSize=16M" \
            --output-dir build \
            LillyGo_S3_Pro_LR1121

      - name: Stage binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          cp build/LillyGo_S3_Pro_LR1121.ino.bin "LillyGo_S3_Pro_LR1121-${VERSION}.bin"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lilygo-bin
          path: LillyGo_S3_Pro_LR1121-*.bin

  release:
    needs: [build-heltec, build-lilygo]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.bin"
          generate_release_notes: true
